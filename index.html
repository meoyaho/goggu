<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>번창 기원상</title>
    <meta name="description" content="새 시작을 응원하는 번창 기원상">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f4c64f'/%3E%3Ccircle cx='32' cy='34' r='18' fill='%23f6c7ad'/%3E%3Cellipse cx='32' cy='34' rx='11' ry='8' fill='%23e89178'/%3E%3Ccircle cx='27' cy='33' r='2' fill='%23551b16'/%3E%3Ccircle cx='37' cy='33' r='2' fill='%23551b16'/%3E%3C/svg%3E">
    <link rel="preload" href="assets/ritual-table-pig-transparent.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite"></main>

    <template id="setup-template">
      <section class="screen setup-screen">
        <div class="table-stage setup-table">
          <img src="assets/ritual-table-pig-transparent.png" alt="돼지머리가 놓인 제사상" class="ritual-table">
        </div>

        <form class="scroll-form" data-setup-form>
          <div class="hanging-scroll ritual-scroll editable-ritual">
            <p class="ritual-date" data-ritual-date></p>
            <p>
              오늘 저희
              <input class="inline-name-input" name="owner_name" data-group-input autocomplete="organization" maxlength="24" required placeholder="모임명">
              외 참석자 일동은 이곳에 모여 천지신명과 이 터를 지켜주시는 토지신께 삼가 고하나이다.
            </p>
            <p>지나온 날들을 무사히 보낼 수 있도록 보살펴 주신 은혜에 깊이 감사드리며, 앞으로 저희가 하고자 하는 모든 일들이 순조롭게 풀리고 큰 결실을 맺을 수 있도록 굽어살펴 주시옵소서.</p>
            <p>
              바라옵건대, 저희
              <input class="inline-name-input" data-group-input maxlength="24" required placeholder="모임명">
              구성원 모두가 건강하고 평안하게 하시고, 오가는 길마다 사고와 재앙을 막아주시며, 늘 화목과 행운이 가득하게 인도하여 주시옵소서.
            </p>
            <p>오늘 저희가 마음과 뜻을 모아 정성껏 제물을 마련하여 올리오니, 기쁘게 받아두시고 저희의 간절한 소망을 이루어 주시옵소서.</p>
            <p class="sanghyang">尙饗(상향)</p>
          </div>
          <button class="primary-action" type="submit">상 차리기</button>
        </form>
      </section>
    </template>

    <template id="main-template">
      <section class="screen main-screen">
        <header class="blessing-panel">
          <div class="hanging-scroll main-blessing-scroll" aria-label="대박 기원 족자">
            <p><strong data-group></strong></p>
            <p>사고 없이 대박 기원</p>
          </div>
        </header>

        <button class="table-stage table-button" type="button" data-random-message aria-label="돼지머리에서 응원 부적 뽑기">
          <img src="assets/ritual-table-pig-transparent.png" alt="돼지머리가 놓인 제사상" class="ritual-table">
          <span class="paper-stack" data-paper-stack aria-hidden="true"></span>
        </button>

        <div class="action-bar">
          <button class="primary-action" type="button" data-owner-only data-invite>사람들 초대하기</button>
          <button class="primary-action" type="button" data-guest-only data-open-message>메시지 작성하기</button>
        </div>
      </section>
    </template>

    <template id="message-modal-template">
      <dialog class="modal" data-message-modal>
        <form class="modal-card message-card" data-message-form method="dialog">
          <button class="icon-close" type="button" data-close-message aria-label="닫기">×</button>
          <h2>응원 남기기</h2>
          <label>
            <span>이름</span>
            <input name="user_name" maxlength="18" required>
          </label>
          <label>
            <span>메시지</span>
            <textarea name="message" rows="4" maxlength="120" required></textarea>
          </label>
          <button class="primary-action" type="submit">보내기</button>
        </form>
      </dialog>
    </template>

    <template id="charm-modal-template">
      <dialog class="modal" data-charm-modal>
        <div class="modal-card charm-card">
          <div class="cheer-poster" data-talisman>
            <div class="poster-corners" aria-hidden="true"></div>
            <div class="poster-confetti" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="poster-badge" aria-hidden="true">대박</div>
            <p class="poster-title">황금 웃는 돼지머리</p>
            <div class="poster-pig" aria-hidden="true">
              <span class="pig-ear left"></span>
              <span class="pig-ear right"></span>
              <span class="pig-face">
                <span class="pig-eye left"></span>
                <span class="pig-eye right"></span>
                <span class="pig-nose"></span>
                <span class="pig-smile"></span>
              </span>
            </div>
            <div class="poster-message-scroll">
              <p data-charm-message></p>
              <b data-charm-author></b>
            </div>
          </div>
          <div class="modal-actions">
            <button class="secondary-action" type="button" data-close-charm>닫기</button>
            <button class="primary-action" type="button" data-save-charm>저장</button>
          </div>
        </div>
      </dialog>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
