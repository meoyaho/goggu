<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>번창 기원상</title>
    <meta name="description" content="새 시작을 응원하는 번창 기원상">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f4c64f'/%3E%3Ccircle cx='32' cy='34' r='18' fill='%23f6c7ad'/%3E%3Cellipse cx='32' cy='34' rx='11' ry='8' fill='%23e89178'/%3E%3Ccircle cx='27' cy='33' r='2' fill='%23551b16'/%3E%3Ccircle cx='37' cy='33' r='2' fill='%23551b16'/%3E%3C/svg%3E">
    <link rel="preload" href="assets/asset-pig-head.png" as="image">
    <link rel="preload" href="assets/asset-pig-head-box.png" as="image">
    <link rel="preload" href="assets/asset-candy-red.png" as="image">
    <link rel="preload" href="assets/asset-candy-yellow.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite"></main>

    <template id="setup-template">
      <section class="screen setup-screen">
        <div class="setup-step is-active" data-setup-step="decorate">
          <header class="setup-header">
            <h1>나만의 고사상 꾸미기</h1>
            <p>고사상을 꾸미고 대박을 기원하세요</p>
          </header>

          <div class="setup-content setup-decor-content">
            <div class="table-stage setup-table empty-altar" data-table-stage data-drop-zone>
              <div class="decor-layer" data-decor-layer></div>
            </div>

            <div class="asset-decor">
              <div class="asset-decor-tabs" role="tablist">
                <button class="asset-decor-tab" type="button" role="tab" data-decor-tab="bg">바탕</button>
                <button class="asset-decor-tab" type="button" role="tab" data-decor-tab="food">차림</button>
                <button class="asset-decor-tab" type="button" role="tab" data-decor-tab="wish">축원</button>
              </div>

              <div class="asset-decor-panel" data-decor-panel="bg">
                <div class="bg-palette" data-bg-palette></div>
              </div>

              <div class="asset-decor-panel" data-decor-panel="food">
                <div class="asset-dock" data-asset-palette></div>
              </div>

              <div class="asset-decor-panel wish-decor-panel" data-decor-panel="wish">
                <div class="wish-input-row" data-wish-inputs>
                  <input class="wish-text-input" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="축원 네 글자">
                  <span class="wish-char-input" aria-hidden="true"></span>
                  <span class="wish-char-input" aria-hidden="true"></span>
                  <span class="wish-char-input" aria-hidden="true"></span>
                  <span class="wish-char-input" aria-hidden="true"></span>
                </div>
              </div>
            </div>
          </div>

          <footer class="screen-footer setup-decor-actions">
            <button class="secondary-action" type="button" data-reset-decoration>초기화</button>
            <button class="primary-action setup-next" type="button" data-next-setup>다음</button>
          </footer>
        </div>

        <form class="setup-form setup-step" data-setup-step="blessing" data-setup-form>
          <header class="setup-header">
            <h1>나만의 고사상 꾸미기</h1>
            <p>고사상을 꾸미고 대박을 기원하세요</p>
          </header>

          <div class="setup-content setup-blessing-content">
            <div class="table-stage setup-table setup-review-table" data-table-stage>
              <div class="decor-layer" data-decor-layer></div>
            </div>

            <div class="setup-ritual-panel">
              <div class="hanging-scroll ritual-scroll editable-ritual ritual-confirm-scroll">
                <p class="ritual-date" data-ritual-date></p>
                <p>
                  오늘 저희
                  <input class="inline-name-input" name="owner_name" data-group-input autocomplete="organization" maxlength="24" required>
                  외 참석자 일동은 이곳에 모여 천지신명과 이 터를 지켜주시는 토지신께 삼가 고하나이다.
                </p>
                <p>지나온 날들을 무사히 보낼 수 있도록 보살펴 주신 은혜에 깊이 감사드리며, 앞으로 저희가 하고자 하는 모든 일들이 순조롭게 풀리고 큰 결실을 맺을 수 있도록 굽어살펴 주시옵소서.</p>
                <p>
                  바라옵건대, 저희
                  <input class="inline-name-input" data-group-input maxlength="24" required>
                  구성원 모두가 건강하고 평안하게 하시고, 오가는 길마다 사고와 재앙을 막아주시며, 늘 화목과 행운이 가득하게 인도하여 주시옵소서.
                </p>
                <p>오늘 저희가 마음과 뜻을 모아 정성껏 제물을 마련하여 올리오니, 기쁘게 받아두시고 저희의 간절한 소망을 이루어 주시옵소서.</p>
                <p class="sanghyang">尙饗(상향)</p>
              </div>
            </div>
          </div>

          <footer class="screen-footer setup-confirm-actions">
            <button class="secondary-action" type="button" data-back-setup>다시 꾸미기</button>
            <button class="primary-action" type="submit">확인</button>
          </footer>
        </form>
      </section>
    </template>

    <template id="main-template">
      <section class="screen main-screen">
        <header class="setup-header main-header">
          <h1 data-main-title></h1>
          <p data-main-subtitle></p>
        </header>

        <div class="setup-content main-content">
          <div class="table-stage table-display" data-table-stage>
            <div class="decor-layer" data-decor-layer></div>
          </div>

          <section class="message-feed-panel" aria-label="응원 리스트">
            <ul class="message-feed" data-message-feed></ul>
          </section>

          <form class="guest-message-panel" id="guest-message-form" data-guest-message-form hidden>
            <label>
              <span>올리는 이</span>
              <input name="user_name" placeholder="이름을 남겨주세요" maxlength="18" required>
            </label>
            <label class="guest-message-body">
              <span>축원</span>
              <textarea name="message" placeholder="응원의 말을 적어주세요" maxlength="100" required></textarea>
            </label>
          </form>
        </div>

        <footer class="screen-footer action-bar">
          <button class="primary-action" type="button" data-owner-only data-invite>사람들 초대하기</button>
          <button class="primary-action" type="submit" form="guest-message-form" data-guest-only>고사상에 올리기</button>
        </footer>
      </section>
    </template>

    <template id="message-modal-template">
      <dialog class="modal" data-message-modal>
        <form class="modal-card message-card" data-message-form method="dialog">
          <button class="icon-close" type="button" data-close-message aria-label="닫기">×</button>
          <h2>응원 남기기</h2>
          <label>
            <span>이름</span>
            <input name="user_name" maxlength="18" required>
          </label>
          <label>
            <span>메시지</span>
            <textarea name="message" rows="4" maxlength="120" required></textarea>
          </label>
          <button class="primary-action" type="submit">보내기</button>
        </form>
      </dialog>
    </template>

    <template id="message-list-modal-template">
      <dialog class="modal" data-message-list-modal>
        <div class="modal-card message-list-card">
          <button class="icon-close" type="button" data-close-message-list aria-label="닫기">×</button>
          <h2>도착한 응원</h2>
          <ul class="message-list" data-message-list></ul>
        </div>
      </dialog>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
